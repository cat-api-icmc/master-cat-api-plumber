services:
  plumber-api:
    build: .
    image: brunosilvestre00/plumber-cat-api
    command: Rscript main.R
    # Plumber listens on 8080 inside the container; exposed only to the nginx proxy
    ports:
      - "8080:8080"
    expose:
      - "8080"
    environment:
      - PLUMBER_HOST=0.0.0.0
      - PLUMBER_PORT=8080
    volumes:
      - .:/app
    networks:
      - cat-api
    deploy:
      replicas: 1

  # nginx:
  #   image: nginx:alpine
  #   depends_on:
  #     - plumber-api
  #   ports:
  #     - "8080:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   networks:
  #     - cat-api

networks:
  cat-api:
    external: true
    name: cat-api
